defaults:
  provider: resy
  party_size: 2
  poll_interval_sec: 60
  notify_on_book: true
  notify_on_failure: true

restaurants:
  4-charles-prime-rib:
    venue_id: 834
    auto_book: true
    notify: true
    party_size: 2
    accept_any_time: true
    min_hours_out: 65
    max_days_out: 30
    poll_interval_sec: 30
    hot_hours: [14, 15, 16, 17, 18]   # 2-6 PM ET — cancellations cluster here
    hot_poll_interval_sec: 20

  carbone:
    venue_id: 6194
    auto_book: false
    notify: true
    party_size: 2
    preferred_times: ["19:00", "19:15", "19:30", "19:45", "20:00"]
    fallback_times: ["20:15", "20:30"]
    min_hours_out: 48
    max_days_out: 30
    poll_interval_sec: 60

  don-angie:
    venue_id: 5286
    auto_book: false
    notify: true
    party_size: 2
    preferred_times: ["19:00", "19:15", "19:30", "19:45", "20:00"]
    fallback_times: ["20:15", "20:30"]
    min_hours_out: 48
    max_days_out: 30
    poll_interval_sec: 90

